name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'
      - 'deploy-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. v1.0.0)'
        required: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Generate Changelog
        id: generate_changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          configuration: |
            {
              "template": "#{{CHANGELOG}}\n\n## Uncategorized\n#{{UNCATEGORIZED}}",
              "pr_template": "- #{{TITLE}} (#{{NUMBER}})",
              "categories": [
                { "title": "## 🚀 Features", "labels": ["enhancement", "feature"] },
                { "title": "## 🐛 Fixes", "labels": ["bug", "fix"] },
                { "title": "## 📝 Documentation", "labels": ["documentation", "docs"] }
              ]
            }

      - name: Summarize Changes with Gemini
        id: ai_summary
        if: success()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGELOG: ${{ steps.generate_changelog.outputs.changelog }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "summary=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Prepare the prompt and send to Gemini
          # We use python here for robust JSON handling
          python3 - <<'PY_EOF'
          import os, json, http.client
          
          api_key = os.environ.get('GEMINI_API_KEY')
          changelog = os.environ.get('CHANGELOG', '')
          
          prompt = f"Please provide a concise, high-level summary of the following documentation changes for a release. Focus on what is new or improved for the user. Output in Markdown format.\n\n{changelog}"
          
          conn = http.client.HTTPSConnection("generativelanguage.googleapis.com")
          payload = json.dumps({"contents": [{"parts": [{"text": prompt}]}]})
          headers = {'Content-Type': 'application/json'}
          
          conn.request("POST", f"/v1beta/models/gemini-3-flash:generateContent?key={api_key}", payload, headers)
          res = conn.getresponse()
          data = res.read().decode("utf-8")
          
          try:
              result = json.loads(data)
              summary = result['candidates'][0]['content']['parts'][0]['text']
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('summary<<EOF\n### 🪄 AI Summary\n' + summary + '\nEOF\n')
          except Exception as e:
              print(f"Error: {e}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('summary=\n')
          PY_EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            ${{ steps.ai_summary.outputs.summary }}
            
            ${{ steps.generate_changelog.outputs.changelog }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
